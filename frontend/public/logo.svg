<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!--
    NeuralGuard Logo — Flat minimal SVG
    Colors: navy #0f172a | teal #10b981 | sky #38bdf8 | white #ffffff
    Works at 512x512 and 32x32
  -->

  <!-- Shield body -->
  <path
    d="M256 32 L432 112 L432 256 C432 358 256 480 256 480 C256 480 80 358 80 256 L80 112 Z"
    fill="#0f172a"
  />

  <!-- Shield inner teal border -->
  <path
    d="M256 64 L408 132 L408 256 C408 344 256 452 256 452 C256 452 104 344 104 256 L104 132 Z"
    fill="none"
    stroke="#10b981"
    stroke-width="6"
    stroke-linejoin="round"
  />

  <!-- Hex grid pattern (6 lightweight hexagons tiled inside shield) -->
  <!-- Row 1 -->
  <polygon points="218,144 238,133 258,144 258,166 238,177 218,166" fill="none" stroke="#10b981" stroke-width="2.5" opacity="0.45"/>
  <polygon points="258,144 278,133 298,144 298,166 278,177 258,166" fill="none" stroke="#10b981" stroke-width="2.5" opacity="0.45"/>
  <!-- Offset row 2 -->
  <polygon points="198,177 218,166 238,177 238,199 218,210 198,199" fill="none" stroke="#10b981" stroke-width="2.5" opacity="0.45"/>
  <polygon points="238,177 258,166 278,177 278,199 258,210 238,199" fill="none" stroke="#10b981" stroke-width="2.5" opacity="0.45"/>
  <polygon points="278,177 298,166 318,177 318,199 298,210 278,199" fill="none" stroke="#10b981" stroke-width="2.5" opacity="0.45"/>
  <!-- Row 3 -->
  <polygon points="218,210 238,199 258,210 258,232 238,243 218,232" fill="none" stroke="#10b981" stroke-width="2.5" opacity="0.45"/>
  <polygon points="258,210 278,199 298,210 298,232 278,243 258,232" fill="none" stroke="#10b981" stroke-width="2.5" opacity="0.45"/>

  <!-- Neural nodes — triangle network -->
  <!-- Edges -->
  <line x1="256" y1="196" x2="190" y2="300" stroke="#38bdf8" stroke-width="7" stroke-linecap="round"/>
  <line x1="256" y1="196" x2="322" y2="300" stroke="#38bdf8" stroke-width="7" stroke-linecap="round"/>
  <line x1="190" y1="300" x2="322" y2="300" stroke="#38bdf8" stroke-width="7" stroke-linecap="round"/>

  <!-- Nodes -->
  <circle cx="256" cy="196" r="16" fill="#0f172a" stroke="#ffffff" stroke-width="5"/>
  <circle cx="190" cy="300" r="16" fill="#0f172a" stroke="#ffffff" stroke-width="5"/>
  <circle cx="322" cy="300" r="16" fill="#0f172a" stroke="#ffffff" stroke-width="5"/>

  <!-- Node inner dots -->
  <circle cx="256" cy="196" r="6" fill="#38bdf8"/>
  <circle cx="190" cy="300" r="6" fill="#10b981"/>
  <circle cx="322" cy="300" r="6" fill="#10b981"/>
</svg>
